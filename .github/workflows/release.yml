name: Build and Release SMS

on:
  release:
    types: [published]

# Essential for the bot to have permission to upload assets
permissions:
  contents: write

jobs:
  build:
    name: Compile and Upload Release Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java Development Kit
        uses: actions/setup-java@v3
        with:
          java-version: '21' 
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      # --- DEBUGGING STEP: This will show you exactly what files were made ---
      - name: List files in target (Debug)
        run: ls -R target/

      - name: Upload Assets to Release
        uses: softprops/action-gh-release@v1
        with:
          # Verify these filenames match your pom.xml <artifactId> and <outfile>
          files: |
            target/StudentSystem.exe
            target/student-management-system-1.0-SNAPSHOT.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}